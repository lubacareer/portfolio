name: Build Flutter web to vercel branch

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable web
        run: flutter config --enable-web

      - name: Install dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release --base-href /

      - name: Include static Vercel config in output
        run: |
          cat > build/web/vercel.json <<'JSON'
          {
            "cleanUrls": true,
            "trailingSlash": false,
            "rewrites": [
              { "source": "/assets/(.*)", "destination": "/assets/$1" },
              { "source": "/canvaskit/(.*)", "destination": "/canvaskit/$1" },
              { "source": "/icons/(.*)", "destination": "/icons/$1" },
              { "source": "/docs/(.*)", "destination": "/docs/$1" },
              { "source": "/images/(.*)", "destination": "/images/$1" },
              { "source": "/favicon.png", "destination": "/favicon.png" },
              { "source": "/manifest.json", "destination": "/manifest.json" },
              { "source": "/flutter(.*).js", "destination": "/flutter$1.js" },
              { "source": "/flutter_service_worker.js", "destination": "/flutter_service_worker.js" },
              { "source": "/version.json", "destination": "/version.json" },
              { "source": "/(.*)", "destination": "/index.html" }
            ],
            "headers": [
              {
                "source": "/flutter_service_worker.js",
                "headers": [
                  { "key": "Cache-Control", "value": "no-cache" }
                ]
              }
            ]
          }
          JSON

      - name: Publish build to vercel branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: vercel
          publish_dir: build/web
          force_orphan: true
